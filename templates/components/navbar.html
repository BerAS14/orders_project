<nav class="navbar">
    <div class="navbar-container">
        <div class="navbar-left">
            <a class="navbar-logo" href="{% url 'home' %}">
                📦 Система Заказов
            </a>
        </div>
        <div class="navbar-right">
            {% if user.is_authenticated %}
                <a href="{% url 'home' %}" class="navbar-link">
                    Мои заказы
                </a>
                <div class="user-dropdown">
                    <button class="user-dropdown-toggle" id="userDropdownButton">
                        <span class="user-name">
                            {{ user.get_full_name|default:user.username }}
                        </span>
                        <span class="dropdown-arrow">
                            ▾
                        </span>
                    </button>
                    <div class="user-dropdown-menu" id="userDropdownMenu">
                        {% if user.is_staff %}
                            <a href="{% url 'admin:index' %}" class="dropdown-item">
                                Админ панель
                            </a>
                        {% endif %}
                        <a href="{% url 'order_create' %}" class="dropdown-item">
                            Новый заказ
                        </a>
                        <form action="{% url 'logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit" class="dropdown-item">
                                Выйти
                            </button>
                        </form>
                    </div>
                </div>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-kind-other-primary btn-small-with-label">
                    Войти
                </a>
            {% endif %}
        </div>
    </div>
</nav>
