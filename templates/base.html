<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Система Заказов{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand {
            font-weight: bold;
        }
        .user-info {
            font-weight: 500;
            color: #fff;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">📦 Система Заказов</a>

            <div class="navbar-nav ms-auto d-flex align-items-center gap-3">
                {% if user.is_authenticated %}
                    <!-- Имя и фамилия пользователя -->
                    <span class="user-info">
                        👤 {{ user.get_full_name|default:user.username }}
                    </span>

                    <!-- Ссылка на заказы -->
                    <a class="nav-link" href="{% url 'home' %}">Мои заказы</a>

                    <!-- Красивая кнопка выхода -->
                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">
                            Выйти
                        </button>
                    </form>

                {% else %}
                    <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">
                        Войти
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
